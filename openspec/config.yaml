schema: spec-driven
language: zh-CN

context: |
  说明
  - 本文件用于约束 OpenSpec 产物与代码实现质量（编码规范/设计约束/测试验收）
  - 项目定位、MVP 范围与分级边界以 openspec/project.md 为准

  通用工程原则
  - 优先最小可行改动，避免过度设计
  - 优先复用现有模块，避免新建并行系统
  - 保持模块职责单一，避免跨层耦合
  - 跨模块数据交互必须通过明确 schema（Pydantic/contracts）

  开发行为准则（Karpathy）
  - 编码前明确关键假设；若需求有歧义，需列出可选解释并说明取舍
  - 不实现未被明确要求的功能、配置或抽象
  - 仅修改与当前需求直接相关的代码（外科手术式改动）
  - 不顺手重构无关模块；发现问题可记录但不在同变更处理
  - 每项改动必须有可验证成功标准

  代码规范（Python）
  - 代码统一位于 src/ 目录下，按领域模块组织（如 src/core、src/runtime、src/storage 等）
  - 必须包含类型注解
  - 公共函数/方法使用 Google Style Docstring（中文），包含 Args/Returns
  - 优先小函数与纯函数，减少副作用
  - api/cli 层不写业务逻辑，业务编排放 service/usecase 层
  - 禁止在异常处理中吞错；必须保留错误语义与日志

  CLI 开发规范（Typer）
  - 命令设计保持稳定、可脚本化，避免破坏性参数变更
  - 命令名、参数名、帮助文本需清晰一致，默认值可预期
  - 所有命令必须返回明确退出码：成功为 0，失败为非 0
  - 错误信息需可操作，包含失败原因与下一步建议
  - 输出区分人类可读与机器可解析场景，必要时提供结构化输出选项
  - 涉及副作用操作（写文件/执行命令/远程调用）需显式提示风险与边界
  - 长任务需提供阶段性进度信息，失败时保留关键上下文用于排障
  - CLI 参数解析与核心业务逻辑分离，便于单元测试

  API 规范
  - 遵循 REST 风格
  - 版本前缀统一为 /api/v1
  - 默认响应结构：{"code": number, "msg": string, "data": object}
  - 必须提供 OpenAPI 文档
  - 涉及鉴权的接口必须明确认证方式与失败码

  数据与持久化规范
  - 数据库变更必须附带 migration 与回滚方案
  - 新表必须包含 created_at 与 updated_at
  - 主键默认使用 UUID V7
  - 新增索引需说明目标查询与收益

  安全与治理规范
  - 所有用户输入必须校验
  - 禁止存储明文敏感信息
  - 涉及命令执行/文件访问/外部连接时必须声明权限边界
  - 高风险动作必须可审计（事件/日志）

  可观测与质量规范
  - 关键业务路径必须记录日志（含 request_id/trace_id）
  - 错误必须记录 error 级别日志
  - 关键链路改动必须补充测试（单测/集成/手工验收至少其一）

rules:

  proposal:
    - 必须包含章节：Why、What、Impact、Non-goals
    - proposal 长度不超过 500 字
    - 避免实现细节，重点说明能力变化与边界变化
    - 必须列出关键假设、歧义取舍与最小改动理由
    - 必须标注受影响模块（src/<模块名>/testing/database/devops/docs）
    - 必须说明 API 兼容性影响、配置变更风险、数据迁移风险

  spec:
    - 每个spec需要使用中文编写
    - 每个 Requirement 必须使用 Gherkin 场景（Given / When / Then）
    - Requirement 描述系统行为，不描述框架实现
    - 每个 Requirement 必须原子化且可独立测试
    - 每个 Requirement 至少包含一个成功场景
    - 每个能力至少包含一个失败场景（鉴权失败/参数错误/资源不存在/超时或取消）
    - 涉及 API 必须明确 method、path、认证方式、关键请求响应字段

  design:
    - 必须包含章节：Architecture、Components、APIs、Data Model
    - 必须说明与现有模块的集成点、边界与替代关系
    - 必须包含错误处理策略与安全设计
    - 必须说明为何是最小实现路径
    - 涉及数据库变更必须给出 migration 与回滚方案
    - 涉及高风险动作必须说明权限边界、审计方式与失败降级策略

  tasks:
    - 任务粒度应控制在 1-2 小时
    - 任务应按模块分类（src/<模块名>/testing/database/devops/docs）
    - 必须包含测试任务与文档更新任务
    - 避免一个任务同时修改多个无关模块
    - 每个任务必须声明验证方式（自动化命令或手工验收路径）
    - 每个任务必须可追溯到对应需求与受影响模块
    - 涉及数据库变更必须包含 migration 编写、执行与回滚验证
